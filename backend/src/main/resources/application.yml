spring:
  application:
    name: mediassist-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mediassist}
    username: ${DB_USERNAME:mediassist}
    password: ${DB_PASSWORD:mediassist}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

mediassist:
  storage:
    documents-root: ${DOCUMENT_STORAGE_ROOT:./storage/documents}
    allowed-extensions:
      - pdf
    allowed-content-types:
      - application/pdf
  chunking:
    max-chunk-size: ${DOCUMENT_CHUNK_MAX_SIZE:1000}
    overlap-size: ${DOCUMENT_CHUNK_OVERLAP_SIZE:150}
  embedding:
    endpoint-url: ${EMBEDDING_SERVICE_URL:http://localhost:8001/api/v1/embeddings}
    model-name: ${EMBEDDING_MODEL_NAME:BAAI/bge-m3}
    dimensions: ${EMBEDDING_DIMENSIONS:1024}
    batch-size: ${EMBEDDING_BATCH_SIZE:32}
