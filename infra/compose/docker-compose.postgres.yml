services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mediassist-postgres
    environment:
      POSTGRES_DB: mediassist
      POSTGRES_USER: mediassist
      POSTGRES_PASSWORD: mediassist
    ports:
      - "5432:5432"
    volumes:
      - mediassist-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediassist -d mediassist"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mediassist-postgres-data:
